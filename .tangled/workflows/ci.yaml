when:
  - event: ["push"]
    branch: ["main"]
  - event: ["pull_request"]

engine: "nixery"

dependencies:
  nixpkgs:
    - emacs30

steps:
  - name: "Install Eldev"
    command: |
      curl -fsSL https://raw.github.com/emacs-eldev/eldev/master/webinstall/eldev | sh
      export PATH="$HOME/.local/bin:$PATH"
      eldev --version

  - name: "Install tree-sitter grammars"
    command: |
      export PATH="$HOME/.local/bin:$PATH"
      eldev eval '(curry-install-grammars)'
      eldev eval '(progn (load "curry-cabal-mode") (curry-cabal-install-grammar))'

  - name: "Byte-compile"
    command: |
      export PATH="$HOME/.local/bin:$PATH"
      eldev byte-compile --warnings-as-errors

  - name: "Test"
    command: |
      export PATH="$HOME/.local/bin:$PATH"
      eldev test

  - name: "Lint"
    command: |
      export PATH="$HOME/.local/bin:$PATH"
      eldev lint
