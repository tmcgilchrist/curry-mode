when:
  - event: ["push"]
    branch: ["main"]
  - event: ["pull_request"]

engine: "nixery"

dependencies:
  nixpkgs:
    - emacs30
    - eldev

steps:
  - name: "Show versions"
    command: |
      emacs --version
      eldev --version

  - name: "Install tree-sitter grammars"
    command: |
      eldev eval '(curry-install-grammars)'
      eldev eval '(progn (load "curry-cabal-mode") (curry-cabal-install-grammar))'

  - name: "Byte-compile"
    command: eldev byte-compile --warnings-as-errors

  - name: "Test"
    command: eldev test

  - name: "Lint"
    command: eldev lint
